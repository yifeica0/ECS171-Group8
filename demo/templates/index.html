<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sentiment Analysis Demo</title>

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg, #0a2a66, #7ec8ff);
    min-height:100vh;
}

.main-card{
    margin-top:80px;
    border-radius:15px;
}

.title{
    font-weight:700;
    color:#333;
}

.result-card{
    margin-top:25px;
}

textarea{
    resize:none;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow-lg main-card">

<div class="card-body p-5">

<h2 class="text-center title mb-4">
Review Sentiment Analysis Demo
</h2>

<p class="text-center text-muted">
Choose a model and analyze the sentiment of your text
</p>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="POST" action="/predict">

<div class="mb-3">

<label class="form-label">Select Model</label>

<select name="model_choice" class="form-select">
    <option value="cnn">CNN Model</option>
    <option value="lr">Logistic Regression Model</option>
</select>

</div>

<div class="mb-3">

<label class="form-label">Enter Text</label>

<textarea class="form-control" rows="5" name="input" placeholder="Type your sentence here..." required></textarea>

</div>

<div class="d-grid">

<button class="btn btn-primary btn-lg">
Analyze Sentiment
</button>

</div>

</form>


{% if result %}

<div class="card result-card border-success">

<div class="card-body text-center">

<h5 class="text-success">Prediction Result</h5>

<h3>{{ result }}</h3>

</div>

</div>

{% endif %}

</div>
</div>
</div>

</div>
</div>

</div>

</body>
</html>
